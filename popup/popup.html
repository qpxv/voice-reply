<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Voice Reply</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="popup">
    <header class="header">
      <h1>Voice Reply</h1>
    </header>

    <section class="field">
      <label class="field-label" for="selection-box">Replying to</label>
      <div id="selection-box" class="selection-box" data-empty="true">
        Highlight some text on the page first.
      </div>
    </section>

    <section class="field">
      <label class="field-label" for="note-input">Your note</label>
      <textarea
        id="note-input"
        class="note-input"
        rows="3"
        placeholder="e.g. &quot;say no but nicely&quot; or &quot;agree and add my own experience&quot;"
      ></textarea>
    </section>

    <section class="field">
      <span class="field-label">Length</span>
      <div class="length-control" id="length-control" role="radiogroup" aria-label="Reply length">
        <button type="button" class="length-option" data-value="short" role="radio" aria-checked="true">Short</button>
        <button type="button" class="length-option" data-value="medium" role="radio" aria-checked="false">Medium</button>
        <button type="button" class="length-option" data-value="long" role="radio" aria-checked="false">Long</button>
      </div>
    </section>

    <section id="ideas-section" class="field ideas-section" hidden>
      <span class="field-label">Ideas</span>
      <div id="ideas-list" class="ideas-list"></div>
    </section>

    <button id="ideas-btn" class="secondary-btn full-width">
      <span class="icon-slot" aria-hidden="true">
        <span class="icon icon-bulb">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-1 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
        </span>
        <span class="icon icon-loader">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        </span>
      </span>
      <span id="ideas-btn-label">Ideas</span>
    </button>

    <button id="write-btn" class="primary-btn">
      <span class="icon-slot" aria-hidden="true">
        <span class="icon icon-send">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
        </span>
        <span class="icon icon-loader">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        </span>
      </span>
      <span id="write-btn-label">Write</span>
    </button>

    <p id="error-message" class="error-message" hidden></p>

    <section id="reply-section" class="field reply-section" hidden>
      <label class="field-label" for="reply-output">Reply</label>
      <textarea id="reply-output" class="reply-output" rows="3" readonly></textarea>

      <div class="action-row">
        <button id="copy-btn" class="secondary-btn">
          <span class="icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>
          </span>
          Copy
        </button>
      </div>

      <p id="status-message" class="status-message" hidden></p>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
